services:
  postgres:
    image: postgres:16-alpine
    container_name: custodian-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: custodian
      POSTGRES_PASSWORD: ${PG_PASSWORD:-custodian_secret}
      POSTGRES_DB: custodian
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U custodian"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
